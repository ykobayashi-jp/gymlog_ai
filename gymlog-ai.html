<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090c;
  --bg2: #0d1117;
  --bg3: #151c26;
  --border: rgba(56,189,248,0.08);
  --border2: rgba(56,189,248,0.18);
  --text: #e2edf7;
  --text2: #7a9ab8;
  --text3: #3d5470;
  --cyan: #38bdf8;
  --cyan2: #7dd3fc;
  --blue: #3b82f6;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #f87171;
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse 100% 35% at 50% 0%, rgba(56,189,248,0.07) 0%, transparent 70%);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}
/* ── Layout ── */
.app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }
header {
  padding: 24px 20px 0;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 0;
  background: linear-gradient(180deg, rgba(56,189,248,0.05) 0%, transparent 100%);
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.logo {
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500;
  color: var(--cyan); letter-spacing: 0.18em; text-transform: uppercase;
  text-shadow: 0 0 20px rgba(56,189,248,0.4);
}
/* ── Tabs ── */
.tabs { display: flex; border-bottom: 0.5px solid var(--border); }
.tab {
  flex: 1; padding: 12px 4px; text-align: center; font-size: 13px;
  cursor: pointer; color: var(--text3); border: none; background: none;
  border-bottom: 2px solid transparent; transition: all .2s;
}
.tab.active {
  color: var(--cyan); border-bottom-color: var(--cyan);
  text-shadow: 0 0 10px rgba(56,189,248,0.45);
}
/* ── Sections ── */
.section { display: none; padding: 20px; }
.section.active { display: block; }
/* ── Upload ── */
.upload-area {
  border: 1px dashed var(--border2);
  border-radius: var(--radius-lg);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  background: var(--bg2);
  transition: border-color .15s, background .15s;
}
.upload-area:hover { border-color: var(--cyan); background: var(--bg3); }
.upload-area .icon { font-size: 32px; margin-bottom: 8px; }
.upload-area p { font-size: 13px; color: var(--text2); }
.upload-area img { max-width: 100%; max-height: 180px; border-radius: var(--radius); margin-top: 12px; object-fit: contain; }
.filetype-hint { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; min-height: 16px; }
/* ── Buttons ── */
.btn-main {
  width: 100%; padding: 13px; border-radius: var(--radius);
  background: var(--cyan); color: #000;
  border: none; font-size: 14px; font-weight: 700;
  cursor: pointer; margin-top: 12px;
  transition: background .15s, transform .1s, box-shadow .2s;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.02em;
}
.btn-main:not(:disabled):hover {
  background: var(--cyan2);
  box-shadow: 0 4px 24px rgba(56,189,248,0.28), 0 0 0 1px rgba(56,189,248,0.15);
}
.btn-main:active { transform: scale(0.98); }
.btn-main:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.btn-sm {
  font-size: 12px; padding: 6px 12px;
  border-radius: var(--radius); cursor: pointer;
  background: var(--bg3); color: var(--text2);
  border: 0.5px solid var(--border2);
  transition: all .15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.btn-sm:hover { background: rgba(56,189,248,0.08); color: var(--text); border-color: rgba(56,189,248,0.3); }
/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-top: 12px;
}
.card-title { font-size: 12px; font-weight: 500; color: var(--text3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
/* ── Loading / Error ── */
.loading { text-align: center; padding: 24px; color: var(--text2); font-size: 13px; }
.spin {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--border2); border-top-color: var(--cyan);
  border-radius: 50%; animation: spin .8s linear infinite;
  margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-card { background: rgba(232,85,85,0.1); border: 0.5px solid var(--red); border-radius: var(--radius-lg); padding: 14px 16px; margin-top: 12px; }
.error-msg { color: var(--red); font-size: 13px; }
.error-detail { color: var(--text3); font-size: 11px; margin-top: 6px; font-family: 'DM Mono', monospace; word-break: break-all; }
/* ── PFC ── */
.pfc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 10px; }
.pfc-cell { background: var(--bg3); border-radius: var(--radius); padding: 12px; text-align: center; }
.pfc-val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }
.pfc-label { font-size: 11px; color: var(--text2); margin-top: 3px; }
/* ── Caption ── */
.caption-box {
  background: var(--bg3); border-radius: var(--radius); padding: 12px;
  font-size: 13px; line-height: 1.8; white-space: pre-wrap; color: var(--text);
  border-left: 2px solid var(--cyan);
}
.tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  background: rgba(56,189,248,0.12); color: var(--cyan);
  border: 0.5px solid rgba(56,189,248,0.3);
}
/* ── Exercise list ── */
.ex-item { padding: 8px 0; border-bottom: 0.5px solid var(--border); }
.ex-item:last-child { border-bottom: none; }
.ex-name { font-weight: 500; font-size: 14px; }
.ex-sets { font-size: 12px; color: var(--text2); margin-top: 3px; font-family: 'DM Mono', monospace; }
/* ── Progress bars ── */
.prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.prog-label { font-size: 12px; color: var(--text2); width: 72px; font-family: 'DM Mono', monospace; }
.prog-bg { flex: 1; background: var(--bg3); border-radius: 20px; height: 6px; }
.prog-fill { height: 6px; border-radius: 20px; transition: width .5s; }
.prog-pct { font-size: 11px; color: var(--text3); width: 32px; text-align: right; font-family: 'DM Mono', monospace; }
/* ── Goal inputs ── */
.goal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.goal-row label { font-size: 13px; color: var(--text2); width: 64px; flex-shrink:0; }
.goal-row input {
  width: 80px; padding: 6px 8px; font-size: 13px;
  border-radius: var(--radius); border: 0.5px solid var(--border2);
  background: var(--bg3); color: var(--text);
  font-family: 'DM Mono', monospace;
}
/* ── PFC Calculator ── */
.goal-btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; }
.goal-btn {
  padding: 12px 6px; border-radius: var(--radius-lg);
  border: 0.5px solid var(--border2); background: var(--bg3);
  cursor: pointer; text-align: center; transition: all .15s; color: var(--text);
}
.goal-btn.active { border: 2px solid var(--cyan); background: rgba(56,189,248,0.1); }
.goal-btn .gb-emoji { font-size: 20px; display: block; margin-bottom: 4px; }
.goal-btn .gb-name { font-size: 13px; font-weight: 700; color: var(--text); }
.goal-btn.active .gb-name { color: var(--cyan); }
.goal-btn .gb-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }
.sex-btn { padding: 7px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 13px; transition: all .15s; }
.sex-btn.active { background: rgba(56,189,248,0.15); color: var(--cyan); border-color: var(--cyan); font-weight: 700; }
.calc-result { background: var(--bg3); border-radius: var(--radius); padding: 12px; margin-top: 10px; }
.calc-kcal { text-align: center; font-size: 13px; color: var(--text2); margin-bottom: 10px; }
.calc-kcal span { font-size: 22px; font-weight: 700; color: var(--cyan); font-family: 'DM Mono', monospace; }
.calc-note { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.6; }
/* ── Stats ── */
.metric-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.metric { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; text-align: center; }
.metric-val { font-size: 24px; font-weight: 700; color: var(--cyan); font-family: 'DM Mono', monospace; }
.metric-label { font-size: 11px; color: var(--text2); margin-top: 4px; }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.history-item:last-child { border-bottom: none; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: rgba(56,189,248,0.12); color: var(--cyan); border: 0.5px solid rgba(56,189,248,0.3); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 2; }
/* ── Chart wrapper ── */
.chart-wrap { position: relative; width: 100%; height: 180px; margin-top: 12px; }
/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--cyan); color: #000; font-weight: 700; font-size: 13px;
  padding: 10px 20px; border-radius: 20px; transition: transform .3s;
  pointer-events: none; z-index: 999;
}
.toast.show { transform: translateX(-50%) translateY(0); }
/* ── Upload enhancements ── */
.upload-area { position: relative; }
.upload-area::before {
  content: ''; position: absolute; inset: 0;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(56,189,248,0.03), transparent);
  pointer-events: none;
}
/* ── Tab labels ── */
.tab-label { font-size: 10px; display: block; margin-top: 2px; color: inherit; }
/* ── API key drawer ── */
.api-drawer { overflow:hidden; max-height:0; transition:max-height .3s ease; }
.api-drawer.open { max-height:80px; }
.api-toggle { display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:0; }
.api-dot { width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0; }
.api-dot.ok { background:var(--green); }

/* ── Card hover ── */
.card { transition: border-color .2s, box-shadow .2s; }
.card:hover { border-color: rgba(56,189,248,0.2); box-shadow: 0 0 0 1px rgba(56,189,248,0.04) inset; }
/* ── Section fade-in ── */
.section.active { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
/* ── Metric accent ── */
.metric:first-child { border-left: 2px solid var(--cyan); box-shadow: inset 2px 0 8px rgba(56,189,248,0.08); }
/* ── Cyan divider ── */
.gold-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(56,189,248,0.3), transparent); margin: 16px 0; }
/* ── Input focus ── */
input:focus {
  outline: none;
  border-color: rgba(56,189,248,0.5) !important;
  box-shadow: 0 0 0 3px rgba(56,189,248,0.08);
}
/* ── Upload area hover glow ── */
.upload-area:hover {
  border-color: var(--cyan) !important;
  box-shadow: 0 0 20px rgba(56,189,248,0.08);
}
/* ── Toast glow ── */
.toast.show {
  transform: translateX(-50%) translateY(0);
  box-shadow: 0 4px 20px rgba(56,189,248,0.3);
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="logo">FORMA<span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;font-weight:400;letter-spacing:0;margin-left:8px;opacity:0.6;">beta</span></div>
      <button class="api-toggle" onclick="toggleApiDrawer()" id="api-toggle-btn">
        <div class="api-dot" id="api-dot"></div>
        <span style="font-size:12px;color:var(--text2);">API Key</span>
        <span id="api-chevron" style="font-size:12px;color:var(--text3);">▾</span>
      </button>
    </div>
    <div class="api-drawer" id="api-drawer">
      <div style="padding:8px 0 12px;display:flex;align-items:center;gap:8px;">
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off"
          style="flex:1;padding:8px 10px;font-size:13px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'DM Mono',monospace;">
        <button onclick="saveKey()" style="padding:8px 14px;background:var(--cyan);color:#000;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;">保存</button>
      </div>
      <div class="key-status" id="keyStatus" style="margin-top:-8px;padding-bottom:8px;font-size:11px;"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('training')" id="tab-training">💪<span class="tab-label">トレーニング</span></button>
      <button class="tab" onclick="switchTab('meal')" id="tab-meal">🍽<span class="tab-label">食事</span></button>
      <button class="tab" onclick="switchTab('goal')" id="tab-goal">🎯<span class="tab-label">ゴール</span></button>
      <button class="tab" onclick="switchTab('stats')" id="tab-stats">📊<span class="tab-label">記録</span></button>
      <button class="tab" onclick="switchTab('insta')" id="tab-insta">📤<span class="tab-label">投稿</span></button>
    </div>
  </header>

  <!-- Training -->
  <div class="section active" id="sec-training">

    <!-- モード切替 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      <button id="mode-btn-manual" onclick="setTrainingMode('manual')"
        style="padding:12px;border-radius:var(--radius-lg);border:2px solid var(--cyan);background:rgba(56,189,248,0.1);color:var(--cyan);font-size:13px;font-weight:700;cursor:pointer;">
        手動入力
      </button>
      <button id="mode-btn-ocr" onclick="setTrainingMode('ocr')"
        style="padding:12px;border-radius:var(--radius-lg);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;">
        ノート撮影
      </button>
    </div>

    <!-- 手動入力モード -->
    <div id="training-manual">
      <!-- 日付 + 自動提案トグル -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <span id="training-date-display" style="font-size:13px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace;cursor:pointer;" onclick="editTrainingDate()"></span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:var(--text3);">前回提案</span>
          <div onclick="toggleSuggestion()" id="suggest-toggle"
            style="width:36px;height:20px;border-radius:20px;background:var(--cyan);cursor:pointer;position:relative;transition:background .2s;">
            <div id="suggest-knob" style="position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:right .2s;"></div>
          </div>
        </div>
      </div>

      <!-- 分割法タブ -->
      <div style="display:flex;gap:6px;margin-bottom:14px;">
        <button id="split-btn-muscle" onclick="setSplitMode('muscle')"
          style="flex:1;padding:8px 4px;border-radius:var(--radius);border:2px solid var(--cyan);background:rgba(56,189,248,0.1);color:var(--cyan);font-size:12px;font-weight:700;cursor:pointer;">部位別</button>
        <button id="split-btn-ppl" onclick="setSplitMode('ppl')"
          style="flex:1;padding:8px 4px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;">PPL</button>
        <button id="split-btn-updown" onclick="setSplitMode('updown')"
          style="flex:1;padding:8px 4px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;">上/下半身</button>
      </div>

      <!-- 部位選択エリア（分割法によって変わる） -->
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;" id="group-select-label">部位を選択</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;" id="muscle-group-btns"></div>

      <!-- 種目選択 -->
      <div id="exercise-picker" style="display:none;">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">種目を選択 <span style="color:var(--text3);">（複数選択可）</span></div>
        <div id="exercise-list-btns" style="margin-bottom:10px;"></div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <input id="custom-exercise-input" placeholder="種目を直接入力..." style="flex:1;padding:8px 10px;font-size:13px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);">
          <button onclick="addCustomExercise()" style="padding:8px 14px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;cursor:pointer;">追加</button>
        </div>
      </div>

      <!-- セット入力エリア -->
      <div id="sets-area"></div>

      <!-- 保存ボタン -->
      <button id="save-training-btn" class="btn-main" style="display:none;" onclick="saveManualTraining()">💾 記録を保存する</button>

      <!-- 今日の記録表示 -->
      <div id="today-training-log"></div>
    </div>

    <!-- OCRモード -->
    <div id="training-ocr" style="display:none;">
      <div id="upload-wrap-training">
        <div class="upload-area" onclick="document.getElementById('file-training').click()">
          <div class="icon">📷</div>
          <p>ノートを撮影してアップロード<br><span style="font-size:11px;">JPEG / PNG / HEIC 対応</span><br><span style="font-size:11px;color:var(--cyan);">日付が書いてあれば過去の記録も登録できます</span></p>
        </div>
        <input type="file" id="file-training" accept="image/*" style="display:none;" onchange="onFile(event,'training')">
        <button class="btn-main" id="btn-training" disabled onclick="analyzeTraining()">🧠 AIで読み取る・保存する</button>
      </div>
      <div id="preview-wrap-training" style="display:none;margin-bottom:2px;">
        <div style="position:relative;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2);">
          <img id="preview-training" style="width:100%;max-height:220px;object-fit:cover;display:block;">
          <div style="position:absolute;top:10px;right:10px;">
            <button onclick="retake('training')" style="background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);">📷 撮り直す</button>
          </div>
        </div>
        <button class="btn-main" id="btn-training2" onclick="analyzeTraining()" style="margin-top:10px;">🧠 AIで読み取る・保存する</button>
      </div>
      <div id="result-training"></div>
    </div>
  </div>

  <!-- Meal -->
  <div class="section" id="sec-meal">
    <div id="upload-wrap-meal">
      <div class="upload-area" onclick="document.getElementById('file-meal').click()">
        <div class="icon">📷</div>
        <p>食事の写真をアップロード<br><span style="font-size:11px;">JPEG / PNG / HEIC 対応</span></p>
      </div>
      <input type="file" id="file-meal" accept="image/*" style="display:none;" onchange="onFile(event,'meal')">
      <button class="btn-main" id="btn-meal" disabled onclick="analyzeMeal()">🧠 PFCを計算・保存する</button>
    </div>
    <div id="preview-wrap-meal" style="display:none;margin-bottom:2px;">
      <div style="position:relative;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2);">
        <img id="preview-meal" style="width:100%;max-height:220px;object-fit:cover;display:block;">
        <div style="position:absolute;top:10px;right:10px;display:flex;gap:8px;">
          <button onclick="retake('meal')" style="background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);">📷 撮り直す</button>
        </div>
      </div>
      <button class="btn-main" id="btn-meal2" onclick="analyzeMeal()" style="margin-top:10px;">🧠 PFCを計算・保存する</button>
    </div>
    <div id="result-meal"></div>
    <div id="meal-advice" style="margin-top:8px;"></div>

    <div class="card" style="margin-top:20px;">
      <div class="card-title">目標PFC を自動計算</div>
      <div class="goal-row"><label>身長</label><input type="number" id="calc-h" value="170" min="140" max="220" oninput="calcPFC()"> cm</div>
      <div class="goal-row"><label>体重</label><input type="number" id="calc-w" value="70" min="40" max="150" oninput="calcPFC()"> kg</div>

<script>

const imgData = { training:{b64:null,mime:null}, meal:{b64:null,mime:null} };
let trainingHistory=[], mealHistory=[], goals={p:150,f:60,c:200};
let chartInstances={};
let calcSex='m', calcGoalMode='maintain', calcActivity='2';

// 活動係数テーブル
const ACT_FACTORS={'0':1.2,'1':1.375,'2':1.55,'3':1.725,'4':1.9};
const ACT_LABELS={'0':'ほぼ運動なし','1':'週1〜2回・軽め','2':'週3〜4回・普通','3':'週5〜6回・ハード','4':'毎日・激しめ'};

// ── Storage (localStorage) ──
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function lsSet(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

function loadAll(){
  trainingHistory = lsGet('gl-training') || [];
  mealHistory     = lsGet('gl-meals')    || [];
  goals           = lsGet('gl-goals')    || {p:150,f:60,c:200};
  const key       = localStorage.getItem('gl-apikey') || '';
  if(key){ document.getElementById('apiKeyInput').value=key; updateKeyStatus(key); }
  const profile   = lsGet('gl-profile') || {h:170,w:70,a:25,sex:'m',mode:'maintain'};
  document.getElementById('calc-h').value=profile.h;
  document.getElementById('calc-w').value=profile.w;
  document.getElementById('calc-a').value=profile.a;
  calcSex=profile.sex||'m';
  calcGoalMode=profile.mode||'maintain';
  calcActivity=profile.activity||'2';
  setSex(calcSex, false);
  setGoalMode(calcGoalMode, false);
  setActivity(calcActivity, false);
  calcPFC();
  const savedSuggest=lsGet('gl-suggest-on');
  if(savedSuggest===false){ suggestionOn=false; }
  initTrainingManual();
}

function toggleApiDrawer(){
  const drawer=document.getElementById('api-drawer');
  const chevron=document.getElementById('api-chevron');
  drawer.classList.toggle('open');
  chevron.textContent=drawer.classList.contains('open')?'▴':'▾';
}
function saveKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(!k){ showToast('APIキーを入力してください'); return; }
  localStorage.setItem('gl-apikey',k);
  updateKeyStatus(k);
  showToast('APIキーを保存しました');
  setTimeout(()=>{ document.getElementById('api-drawer').classList.remove('open'); document.getElementById('api-chevron').textContent='▾'; },600);
}
function updateKeyStatus(k){
  const dot=document.getElementById('api-dot');
  const el=document.getElementById('keyStatus');
  if(k&&k.startsWith('sk-ant-')){
    dot.classList.add('ok');
    el.textContent='✓ APIキー設定済み'; el.style.color='var(--green)';
  } else {
    dot.classList.remove('ok');
    el.textContent='⚠ 形式を確認 (sk-ant-...)'; el.style.color='var(--red)';
  }
}
function getKey(){ return localStorage.getItem('gl-apikey')||''; }

function setSex(s, recalc=true){
  calcSex=s;
  document.getElementById('sex-m').classList.toggle('active',s==='m');
  document.getElementById('sex-f').classList.toggle('active',s==='f');
  if(recalc) calcPFC();
}
function setGoalMode(g, recalc=true){
  calcGoalMode=g;
  ['bulk','maintain','cut'].forEach(k=>document.getElementById('gbtn-'+k).classList.toggle('active',k===g));
  if(recalc) calcPFC();
}
function setActivity(a, recalc=true){
  calcActivity=a;
  ['0','1','2','3','4'].forEach(k=>{
    const btn=document.getElementById('abtn-'+k);
    if(!btn) return;
    if(k===a){
      btn.style.border='0.5px solid var(--cyan)';
      btn.style.background='rgba(56,189,248,0.1)';
      btn.querySelector('div:last-child').style.color='var(--cyan)';
    } else {
      btn.style.border='0.5px solid var(--border2)';
      btn.style.background='var(--bg3)';
      btn.querySelector('div:last-child').style.color='var(--text2)';
    }
  });
  if(recalc) calcPFC();
}
function calcPFC(){
  const h=parseFloat(document.getElementById('calc-h').value)||170;
  const w=parseFloat(document.getElementById('calc-w').value)||70;
  const a=parseFloat(document.getElementById('calc-a').value)||25;
  const bmr=calcSex==='m'?Math.round(88.36+(13.4*w)+(4.8*h)-(5.7*a)):Math.round(447.6+(9.2*w)+(3.1*h)-(4.3*a));
  const factor=ACT_FACTORS[calcActivity]||1.55;
  const tdee=Math.round(bmr*factor);
  let kcal, note;
  if(calcGoalMode==='bulk'){ kcal=tdee+300; note=`TDEE+300kcal（${ACT_LABELS[calcActivity]}）。週0.25〜0.5kgペースで増量。`; }
  else if(calcGoalMode==='cut'){ kcal=tdee-400; note=`TDEE-400kcal（${ACT_LABELS[calcActivity]}）。週0.3〜0.5kgペースで減量。タンパク質多めで筋肉を守る。`; }
  else { kcal=tdee; note=`TDEE維持（${ACT_LABELS[calcActivity]}）。筋肉量を増やしながら体重キープ。`; }
  const p=calcGoalMode==='cut'?Math.round(w*2.2):Math.round(w*2.0);
  const f=Math.round(kcal*0.25/9);
  const c=Math.max(0,Math.round((kcal-p*4-f*9)/4));
  const diff=kcal-tdee;
  const diffStr=diff>0?`+${diff}kcal`:diff<0?`${diff}kcal`:'±0kcal';
  document.getElementById('calc-bmr').textContent=bmr.toLocaleString();
  document.getElementById('calc-tdee').textContent=tdee.toLocaleString();
  document.getElementById('calc-kcal').textContent=kcal.toLocaleString();
  document.getElementById('calc-diff').textContent=`TDEE ${diffStr}`;
  document.getElementById('calc-p').textContent=p;
  document.getElementById('calc-f').textContent=f;
  document.getElementById('calc-c').textContent=c;
  document.getElementById('calc-note').textContent=note;
  window._calcPFC={p,f,c,kcal};
}
function applyPFC(){
  if(!window._calcPFC) return;
  const {p,f,c}=window._calcPFC;
  goals={p,f,c};
  lsSet('gl-goals',goals);
  const h=parseFloat(document.getElementById('calc-h').value)||170;
  const w=parseFloat(document.getElementById('calc-w').value)||70;
  const a=parseFloat(document.getElementById('calc-a').value)||25;
  lsSet('gl-profile',{h,w,a,sex:calcSex,mode:calcGoalMode,activity:calcActivity});
  showToast(`目標を設定しました P:${p}g F:${f}g C:${c}g`);
  refreshTodayTotals();
}

// ── File select ──
function onFile(event, type){
  const file=event.target.files[0]; if(!file) return;
  showLoadingPreview(type);

    imgData[type]={b64,mime:'image/jpeg'};
    document.getElementById('preview-'+type).src=url;
    document.getElementById('upload-wrap-'+type).style.display='none';
    document.getElementById('preview-wrap-'+type).style.display='block';
  }).catch(err=>{
    showToast('画像の読み込みに失敗しました: '+err.message);
    retake(type);
  });
}

function showLoadingPreview(type){
  document.getElementById('upload-wrap-'+type).style.display='none';
  document.getElementById('preview-wrap-'+type).style.display='block';
  document.getElementById('preview-'+type).src='';
  document.getElementById('preview-'+type).alt='読み込み中...';
}

async function compressToJpeg(file, maxPx=1280, quality=0.82){
  // まずcreateImageBitmapで試みる（HEIF/HEICにも対応）
  let bitmap;
  try{
    bitmap=await createImageBitmap(file);
  }catch(e){
    // フォールバック: FileReaderで読んでImageで試みる
    const dataUrl=await readAsDataUrl(file);
    bitmap=await new Promise((res,rej)=>{
      const img=new Image();
      img.onload=()=>res(img);
      img.onerror=()=>rej(new Error('画像を開けませんでした'));
      img.src=dataUrl;
    });
  }

  const ow=bitmap.width||bitmap.naturalWidth;
  const oh=bitmap.height||bitmap.naturalHeight;
  const scale=Math.min(1, maxPx/Math.max(ow,oh));
  const w=Math.round(ow*scale);
  const h=Math.round(oh*scale);

  const canvas=document.createElement('canvas');
  canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(bitmap,0,0,w,h);
  const url=canvas.toDataURL('image/jpeg',quality);
  return {b64:url.split(',')[1], url};
}

function readAsDataUrl(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=()=>rej(new Error('ファイル読み込み失敗'));
    r.readAsDataURL(file);
  });
}
function retake(type){
  imgData[type]={b64:null,mime:null};
  document.getElementById('file-'+type).value='';
  document.getElementById('upload-wrap-'+type).style.display='block';
  document.getElementById('preview-wrap-'+type).style.display='none';
  document.getElementById('result-'+type).innerHTML='';
  if(document.getElementById('btn-'+type)) document.getElementById('btn-'+type).disabled=true;
}
function resetAfterAnalysis(type){
  setTimeout(()=>{

// ── API ──
async function callClaude(prompt,b64,mime){
  const key=getKey();
  if(!key) throw new Error('APIキーが未設定です。API Keyをタップして入力してください。');
  if(!b64) throw new Error('画像データがありません。もう一度写真を選んでください。');

  let res;
  try{
    res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:prompt}
        ]}]
      })
    });
  }catch(networkErr){
    // fetch自体が失敗（ネットワーク切断・CORS・混在コンテンツなど）
    const msg=networkErr.message||'';
    if(msg.includes('Load failed')||msg.includes('Failed to fetch')||msg.includes('Network')){
      throw new Error(`ネットワークエラー: APIへの接続に失敗しました。\n① iPhoneのWi-Fi/通信を確認\n② SafariのURLがhttps://で始まっているか確認\n③ 設定→Safari→「サイト越えトラッキングを防ぐ」を一時オフ\nエラー詳細: ${msg}`);
    }
    throw new Error(`接続エラー: ${msg}`);
  }

  if(!res.ok){
    let errMsg=res.statusText;
    try{ const e=await res.json(); errMsg=e?.error?.message||errMsg; }catch(_){}
    if(res.status===401) throw new Error('APIキーが無効です。正しいキーを再入力してください。');
    if(res.status===429) throw new Error('APIのレート制限に達しました。少し待ってから再試行してください。');
    if(res.status===413) throw new Error('画像サイズが大きすぎます。もう少し小さい画像を使ってください。');
    throw new Error(`APIエラー ${res.status}: ${errMsg}`);
  }

  const data=await res.json();
  if(data.error) throw new Error(`APIエラー: ${data.error.message}`);
  return data.content.map(b=>b.text||'').join('');
}
function parseJSON(raw){
  const clean=raw.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
  const s=clean.indexOf('{'), e=clean.lastIndexOf('}')+1;
  if(s<0) throw new Error('JSONが見つかりません: '+clean.slice(0,120));
  return JSON.parse(clean.slice(s,e));
}

async function analyzeTraining(){

  if(btn) btn.disabled=true;
  document.getElementById('result-training').innerHTML='<div class="loading"><span class="spin"></span>ノートを読み取り中...</div>';
  try{
    const {b64,mime}=imgData.training;
    const prompt=`このトレーニングノートの写真を解析してください。手書きのトレーニング記録を読み取り、以下のJSON形式のみ返してください。前置き・マークダウン不要。
{"date":"YYYY-MM-DD","exercises":[{"name":"種目名","sets":[{"weight":重量数値,"reps":rep数値}]}],"instagram_caption":"Instagram投稿用キャプション（日本語・ハッシュタグ5個以内・150文字以内）"}`;
    const raw=await callClaude(prompt,b64,mime);
    const data=parseJSON(raw);
    if(!data.date||!/^\d{4}-\d{2}-\d{2}$/.test(data.date)) data.date=today();
    trainingHistory.push({...data,savedAt:Date.now()});
    lsSet('gl-training',trainingHistory);
    renderTrainingResult(data,true);
    resetAfterAnalysis('training');
  }catch(e){ showError('result-training','読み取りエラー',e.message); }

}

              <input value="${e.name}" id="ocr-name-${idx}-${ei}" style="width:100%;padding:6px 8px;font-size:13px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);margin-bottom:6px;">

function applyOcrEdit(idx){
  const s=trainingHistory[idx]; if(!s) return;
  const newEx=s.exercises.map((e,ei)=>{
    const name=document.getElementById('ocr-name-'+idx+'-'+ei)?.value||e.name;
    const sets=e.sets.map((st,si)=>({
      weight:parseFloat(document.getElementById('ocr-w-'+idx+'-'+ei+'-'+si)?.value)||st.weight,
      reps:parseInt(document.getElementById('ocr-r-'+idx+'-'+ei+'-'+si)?.value)||st.reps
    }));
    return {name,sets};
  });
  trainingHistory[idx].exercises=newEx;
  lsSet('gl-training',trainingHistory);
  document.getElementById('ocr-edit-'+idx).style.display='none';
  // 表示更新
  const exHTML=newEx.map(e=>{
    const sets=(e.sets||[]).map((s,i)=>`Set${i+1}: ${s.weight}kg×${s.reps}rep`).join('　');
    return `<div class="ex-item"><div class="ex-name">${e.name}</div><div class="ex-sets">${sets}</div></div>`;

}

async function analyzeMeal(){
  const btn=document.getElementById('btn-meal2')||document.getElementById('btn-meal');
  if(btn) btn.disabled=true;
  document.getElementById('result-meal').innerHTML='<div class="loading"><span class="spin"></span>PFCを計算中...</div>';
  try{
    const {b64,mime}=imgData.meal;
    const prompt=`この食事の写真のPFCを推定してください。以下のJSON形式のみ返してください。前置き・マークダウン不要。
{"date":"YYYY-MM-DD","meal_name":"料理名","calories":数値,"protein":数値,"fat":数値,"carbs":数値,"instagram_caption":"Instagram投稿用キャプション（日本語・ハッシュタグ5個以内・100文字以内）"}`;
    const raw=await callClaude(prompt,b64,mime);
    const data=parseJSON(raw);
    if(!data.date||!/^\d{4}-\d{2}-\d{2}$/.test(data.date)) data.date=today();
    mealHistory.push({...data,savedAt:Date.now()});
    lsSet('gl-meals',mealHistory);
    renderMealResult(data,true);
    resetAfterAnalysis('meal');
  }catch(e){ showError('result-meal','解析エラー',e.message); }
  if(btn) btn.disabled=false;
}
function renderMealResult(data, saved){
  const d=data.date||today();
  const savedAt=data.savedAt||Date.now();
  const timeStr=data.timeStr||(()=>{const n=new Date(savedAt);return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;})();
  if(!mealHistory[mealHistory.length-1].timeStr) mealHistory[mealHistory.length-1].timeStr=timeStr;

  renderTodayMeals(d);
  pushInstaCard({type:'meal', data:{...data,timeStr}, idx:mealHistory.length-1});
  // ② 食事アドバイス
  const advices=getMealAdvice(data);
  if(advices.length>0){
    setTimeout(()=>{
      const advEl=document.getElementById('meal-advice');
      if(advEl) advEl.innerHTML=advices.map(a=>`<div style="padding:6px 10px;margin-bottom:4px;background:rgba(56,189,248,0.08);border-radius:var(--radius);border-left:2px solid var(--cyan);font-size:12px;color:var(--text2);">${a}</div>`).join('');
    },300);
  }
}

function toggleMealEdit(idx){

}

async function recalcMeal(idx){
  const name=document.getElementById(`edit-name-${idx}`).value;
  if(!name){ showToast('メニュー名を入力してください'); return; }
  const btn=document.querySelector(`#meal-edit-${idx} button[onclick="recalcMeal(${idx})"]`);
  if(btn){ btn.disabled=true; btn.textContent='計算中...'; }
  try{
    const key=getKey();
    if(!key) throw new Error('APIキーが未設定です');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,
        messages:[{role:'user',content:`「${name}」のカロリー・PFCを推定してください。JSONのみ返してください。{"calories":数値,"protein":数値,"fat":数値,"carbs":数値}`}]})
    });
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('');
    const parsed=JSON.parse(raw.replace(/```[\w]*\n?/g,'').trim());
    document.getElementById(`edit-cal-${idx}`).value=Math.round(parsed.calories||0);
    document.getElementById(`edit-p-${idx}`).value=Math.round(parsed.protein||0);
    document.getElementById(`edit-f-${idx}`).value=Math.round(parsed.fat||0);
    document.getElementById(`edit-c-${idx}`).value=Math.round(parsed.carbs||0);
    showToast('再計算しました');
  }catch(e){ showToast('再計算エラー: '+e.message); }
  if(btn){ btn.disabled=false; btn.textContent='🧠 再計算'; }
}

function applyMealEdit(idx){
  const name=document.getElementById(`edit-name-${idx}`).value||mealHistory[idx].meal_name;
  const cal=parseFloat(document.getElementById(`edit-cal-${idx}`).value)||mealHistory[idx].calories;
  const p=parseFloat(document.getElementById(`edit-p-${idx}`).value)||mealHistory[idx].protein;
  const f=parseFloat(document.getElementById(`edit-f-${idx}`).value)||mealHistory[idx].fat;
  const c=parseFloat(document.getElementById(`edit-c-${idx}`).value)||mealHistory[idx].carbs;
  mealHistory[idx]={...mealHistory[idx],meal_name:name,calories:cal,protein:p,fat:f,carbs:c};
  lsSet('gl-meals',mealHistory);
  document.getElementById(`meal-name-display-${idx}`).textContent=name;
  document.getElementById(`meal-kcal-${idx}`).innerHTML=`${Math.round(cal)} <span style="font-size:12px;color:var(--text2);">kcal</span>`;
  document.getElementById(`meal-p-${idx}`).textContent=Math.round(p)+'g';
  document.getElementById(`meal-f-${idx}`).textContent=Math.round(f)+'g';
  document.getElementById(`meal-c-${idx}`).textContent=Math.round(c)+'g';
  document.getElementById(`meal-edit-${idx}`).style.display='none';
  const instaIdx=instaCards.findIndex(ic=>ic.type==='meal'&&ic.idx===idx);
  if(instaIdx>=0) instaCards[instaIdx].data={...instaCards[instaIdx].data,meal_name:name,calories:cal,protein:p,fat:f,carbs:c};
  refreshTodayTotals();
  showToast('修正を適用しました');
}

function deleteMeal(idx){
  const m=mealHistory[idx];
  if(!m) return;
  if(!confirm(`「${m.meal_name||'食事'}」を削除しますか？`)) return;
  mealHistory.splice(idx,1);
  lsSet('gl-meals',mealHistory);
  showToast('削除しました');
  renderTodayMeals(today());
}

// ── 種目名3段階セレクト生成 ──
function buildExerciseSelect(id, currentName){
  // 現在の種目からデフォルト部位・サブを逆引き
  let defaultPart='', defaultSub='';
  Object.entries(MUSCLE_GROUPS).forEach(([part,subs])=>{
    Object.entries(subs).forEach(([sub,exs])=>{
      if(exs.includes(currentName)){ defaultPart=part; defaultSub=sub; }
    });
  });
  const partOpts=Object.keys(MUSCLE_GROUPS).map(p=>`<option value="${p}" ${p===defaultPart?'selected':''}>${p}</option>`).join('');
  const subOpts=defaultPart?Object.keys(MUSCLE_GROUPS[defaultPart]).map(s=>`<option value="${s}" ${s===defaultSub?'selected':''}>${s}</option>`).join(''):'';
  const exOpts=defaultPart&&defaultSub?MUSCLE_GROUPS[defaultPart][defaultSub].map(ex=>`<option value="${ex}" ${ex===currentName?'selected':''}>${ex}</option>`).join(''):'';
  const sel=(sid,opts,onch)=>`<select id="${sid}" onchange="${onch}" style="flex:1;padding:7px 6px;font-size:13px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);">${opts}</select>`;
  return `<div style="display:flex;gap:5px;margin-bottom:8px;">
    ${sel(id+'-part','<option value="">部位</option>'+partOpts,`updateExSub('${id}')`)}
    ${sel(id+'-sub',subOpts?subOpts:'<option value="">種別</option>',`updateExList('${id}')`)}
    ${sel(id,exOpts?exOpts:'<option value="">種目</option>','')}
  </div>`;
}
function updateExSub(baseId){
  const part=document.getElementById(baseId+'-part')?.value;
  const subSel=document.getElementById(baseId+'-sub');
  const exSel=document.getElementById(baseId);
  if(!part||!subSel||!exSel) return;
  const subs=Object.keys(MUSCLE_GROUPS[part]||{});
  subSel.innerHTML=subs.map((s,i)=>`<option value="${s}" ${i===0?'selected':''}>${s}</option>`).join('');
  updateExList(baseId);
}
function updateExList(baseId){
  const part=document.getElementById(baseId+'-part')?.value;
  const sub=document.getElementById(baseId+'-sub')?.value;
  const exSel=document.getElementById(baseId);
  if(!part||!sub||!exSel) return;
  const exs=MUSCLE_GROUPS[part]?.[sub]||[];
  exSel.innerHTML=exs.map((ex,i)=>`<option value="${ex}" ${i===0?'selected':''}>${ex}</option>`).join('');
}

function getMergedExercises(splitKey){
  const groups=currentSplitMode==='ppl'?PPL_GROUPS:UPDOWN_GROUPS;
  const g=groups[splitKey]; if(!g) return {};
  const merged={};
  g.parts.forEach(part=>{
    const partGroup=MUSCLE_GROUPS[part]||{};
    Object.entries(partGroup).forEach(([sub,exs])=>{ merged[part+' / '+sub]=exs; });
  });
  Object.entries(g.extraSub||{}).forEach(([part,subs])=>{
    Object.entries(subs).forEach(([sub,exs])=>{ merged[part+' / '+sub]=exs; });
  });
  return merged;
}
function renderSubGroup(sub,exs){
  const parts=sub.split(' / ');
  const partName=parts[0],subName=parts[1]||parts[0];
  const partColor=MUSCLE_COLORS[partName]||'var(--text2)';
  const subColor=SUB_COLORS[subName]||'var(--text3)';
  const btns=exs.map(ex=>{
    const sel=selectedExercises.find(e=>e.name===ex);
    const safe=ex.replace(/'/g,"\\'");
    return '<button onclick="toggleExercise(\''+safe+'\',\''+subName+'\')" style="padding:6px 11px;border-radius:20px;border:'+(sel?'2px solid var(--cyan)':'1px solid var(--border2)')+';background:'+(sel?'rgba(56,189,248,0.12)':'var(--bg2)')+';color:'+(sel?'var(--cyan)':'var(--text2)')+';font-size:12px;font-weight:'+(sel?700:400)+';cursor:pointer;margin-bottom:4px;">'+ex+(sel?' ✓':'')+'</button>';
  }).join('');
  return '<div style="margin-bottom:12px;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><span style="font-size:10px;padding:2px 7px;border-radius:20px;background:'+partColor+'22;color:'+partColor+';border:0.5px solid '+partColor+';">'+partName+'</span><span style="font-size:11px;font-weight:700;color:'+subColor+';">'+subName+'</span></div><div style="display:flex;flex-wrap:wrap;gap:5px;">'+btns+'</div></div>';
}
function renderExerciseListBtns(){
  const el=document.getElementById('exercise-list-btns');

    el.innerHTML=Object.entries(merged).map(([sub,exs])=>renderSubGroup(sub,exs)).join('');
  }
}
function toggleExercise(name, sub){

function getPastMax(name){

  return max>0?max:null;

function updateSet(ei,si,field,val){
  if(selectedExercises[ei]&&selectedExercises[ei].sets[si]){
    let v=parseFloat(val);
    if(isNaN(v)||v<0) v=0;
    selectedExercises[ei].sets[si][field]=v===0?0:v;
    // DOMの値も0未満にならないよう修正
    const inputs=document.querySelectorAll('#set-row-'+ei+'-'+si+' input');
    // 直接DOMは触らずstateだけ更新でOK
  }
}
function addSet(ei){ selectedExercises[ei].sets.push({weight:'',reps:''}); renderSetsArea(); }
function removeSet(ei,si){
  if(selectedExercises[ei].sets.length<=1){showToast('最低1セット必要です');return;}
  selectedExercises[ei].sets.splice(si,1); renderSetsArea();
}
function removeExercise(ei){ selectedExercises.splice(ei,1); renderSetsArea(); renderExerciseListBtns(); }
function resolveMuscleParts(splitMode,splitGroup,muscleGroup){
  // PPL/上下半身の場合は含まれる部位を配列で返す
  if(splitMode==='ppl'&&splitGroup){
    const g=PPL_GROUPS[splitGroup];
    return g?[splitGroup,...(g.parts||[])]:[splitGroup];
  }
  if(splitMode==='updown'&&splitGroup){
    const g=UPDOWN_GROUPS[splitGroup];
    return g?[splitGroup,...(g.parts||[])]:[splitGroup];
  }
  return muscleGroup?[muscleGroup]:[];
}
function saveManualTraining(){
  const validEx=selectedExercises.filter(e=>e.sets.some(s=>s.weight&&s.reps));
  if(!validEx.length){showToast('重量とrepを入力してください');return;}
  const parts=resolveMuscleParts(currentSplitMode,currentSplitGroup,currentMuscleGroup);
  const groupLabel=parts[0]||'';
  // 部位フィルター用にpartsを保存
  const record={date:trainingInputDate,muscleGroup:groupLabel,muscleParts:parts,
    exercises:validEx.map(e=>({name:e.name,sets:e.sets.filter(s=>s.weight&&s.reps).map(s=>({weight:parseFloat(s.weight),reps:parseInt(s.reps)}))})),
    instagram_caption:generateTrainingCaption(validEx,currentMuscleGroup),savedAt:Date.now()};
  trainingHistory.push(record);
  lsSet('gl-training',trainingHistory);
  pushInstaCard({type:'training',data:record});
  showToast('記録を保存しました！');
  selectedExercises=[]; currentMuscleGroup=null;
  renderMuscleGroupBtns();
  document.getElementById('exercise-picker').style.display='none';
  renderSetsArea(); renderTodayTrainingLog();
}
function generateTrainingCaption(exercises,group){
  const lines=exercises.map(e=>{const best=e.sets.reduce((m,s)=>parseFloat(s.weight||0)>m?parseFloat(s.weight):m,0);return `${e.name} ${best}kg`;});
  const tags=['#筋トレ','#筋トレ記録','#GymLife','#ジム'];
  if(group) tags.push(`#${group}トレ`);
  // Instagram上限5個
  return `【${group||''}トレ記録】\n${lines.join(' / ')}\n\n${tags.slice(0,5).join(' ')}`;
}

// ── 共通: セッション群から種目マージ ──
function flattenMergeSessionDay(sessions){
  const flat=[];
  sessions.forEach(s=>{
    const realIdx=trainingHistory.findIndex(t=>t.savedAt===s.savedAt&&t.date===s.date);
    (s.exercises||[]).forEach((e,ei)=>flat.push({name:e.name,sets:[...e.sets],realIdx,ei}));
  });
  // 同名種目マージ
  const merged=[];
  flat.forEach(e=>{
    const found=merged.find(m=>m.name===e.name);
    if(found){ found.sets=[...found.sets,...e.sets]; }
    else merged.push({...e,sets:[...e.sets]});
  });
  return merged;
}

// ── ① AI分析アドバイス ──
async function runAIAnalysis(){
  const btn=document.getElementById('ai-analysis-btn');
  const resultEl=document.getElementById('ai-analysis-result');
  if(!resultEl) return;
  if(trainingHistory.length<3){
    resultEl.innerHTML=`<div style="font-size:13px;color:var(--text2);padding:8px;background:var(--bg3);border-radius:var(--radius);">📊 まだデータが少ないです。2週間分の記録が溜まるとより正確な分析ができます。</div>`;
    return;
  }
  btn.disabled=true;
  resultEl.innerHTML='<div class="loading"><span class="spin"></span>分析中...</div>';
  try{
    const key=getKey();
    if(!key) throw new Error('APIキーが未設定です');
    // 直近30件のトレーニングサマリーを作成
    const recent=[...trainingHistory].sort((a,b)=>b.savedAt-a.savedAt).slice(0,30);
    const summary=recent.map(s=>`${s.date} [${s.muscleGroup||''}] ${(s.exercises||[]).map(e=>`${e.name}:${e.sets.map(st=>`${st.weight}×${st.reps}`).join(',')}`).join(' | ')}`).join('\n');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
        messages:[{role:'user',content:`以下は筋トレ記録です。日本語で簡潔に3点だけ分析してください：①停滞している種目、②部位の偏り、③先週と今週の比較。各50字以内で。\n\n${summary}`}]})
    });
    const data=await res.json();
    const text=data.content.map(b=>b.text||'').join('');
    const html=text
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');
    resultEl.innerHTML=`<div style="font-size:13px;color:var(--text);line-height:1.9;padding:10px;background:var(--bg3);border-radius:var(--radius);">${html}</div>`;
  }catch(e){
    resultEl.innerHTML=`<div style="font-size:12px;color:var(--red);padding:6px;">エラー: ${e.message}</div>`;
  }
  btn.disabled=false;
}

function getMealAdvice(data){
  const msgs=[];
  const d=data.date||today();
  const todayMeals=mealHistory.filter(m=>m.date===d);
  const tCal=Math.round(todayMeals.reduce((s,m)=>s+(m.calories||0),0));
  const tP=Math.round(todayMeals.reduce((s,m)=>s+(m.protein||0),0));
  const tF=Math.round(todayMeals.reduce((s,m)=>s+(m.fat||0),0));
  const goalCal=goals.p*4+goals.f*9+goals.c*4;
  if(goalCal>0){
    const ratio=tCal/goalCal;
    if(ratio>1.25) msgs.push(`⚠️ 今日のカロリーが目標の${Math.round(ratio*100)}%に達しています`);
    else if(ratio<0.6&&todayMeals.length>=2) msgs.push(`⚠️ カロリーが目標の${Math.round(ratio*100)}%と少なめです。筋肉の維持に影響する可能性があります`);
  }
  if(goals.p>0&&tP<goals.p*0.6) msgs.push(`💪 タンパク質が目標の${Math.round(tP/goals.p*100)}%です。あと${goals.p-tP}g摂れると理想的`);
  if(goals.f>0&&tF<20&&todayMeals.length>=2) msgs.push(`🥑 脂質が${tF}gと少なめです。テストステロン維持のため最低30gは摂りましょう`);
  if(goals.f>0&&tF>goals.f*1.5) msgs.push(`🍟 脂質が目標の${Math.round(tF/goals.f*100)}%と多めです`);
  return msgs;
}

function buildDateSelects(dl){
  const now=new Date();
  const selY=dl?parseInt(dl.slice(0,4)):now.getFullYear();
  const selM=dl?parseInt(dl.slice(5,7)):now.getMonth()+1;
  const selD=dl?parseInt(dl.slice(8,10)):now.getDate();
  const sel=(id,opts,val)=>{
    const style=`padding:8px 4px;font-size:14px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);width:100%;text-align:center;`;
    return `<select id="${id}" style="${style}" onchange="onDateSelect()">
      ${opts.map(o=>`<option value="${o.v}" ${o.v===val?'selected':''}>${o.l}</option>`).join('')}
    </select>`;
  };
  const years=[]; for(let y=now.getFullYear();y<=now.getFullYear()+3;y++) years.push({v:y,l:`${y}年`});
  const months=[]; for(let m=1;m<=12;m++) months.push({v:m,l:`${m}月`});
  const days=[]; for(let d=1;d<=31;d++) days.push({v:d,l:`${d}日`});
  return sel('gi-dy',years,selY)+sel('gi-dm',months,selM)+sel('gi-dd',days,selD);
}

function updateGoalStats(){
  const cwEl=document.getElementById('gi-cw');
  const twEl=document.getElementById('gi-tw');
  if(!cwEl||!twEl) return;
  const cw=parseFloat(cwEl.value)||78;
  const tw=parseFloat(twEl.value)||65;
  const dl=getDeadline();
  const diff=Math.round((cw-tw)*10)/10;
  const weeksLeft=dl?Math.max(0,Math.round((new Date(dl)-new Date())/(7*24*3600*1000))):null;
  const daysLeft=dl?Math.max(0,Math.round((new Date(dl)-new Date())/(24*3600*1000))):null;
  const weeklyLoss=weeksLeft&&weeksLeft>0?Math.round((diff/weeksLeft)*10)/10:null;

  const statsEl=document.getElementById('goal-stats');
  const timelineEl=document.getElementById('goal-timeline');
  const noteEl=document.getElementById('goal-note');
  if(!statsEl) return;

  if(diff>0&&daysLeft!==null){
    statsEl.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
        <div style="background:rgba(0,0,0,0.3);border-radius:var(--radius);padding:10px;text-align:center;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">減量目標</div>

          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">残り日数</div>
          <div style="font-size:18px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;">${daysLeft}日</div>
        </div>
        <div style="background:rgba(56,189,248,0.15);border:0.5px solid rgba(56,189,248,0.4);border-radius:var(--radius);padding:10px;text-align:center;">
          <div style="font-size:11px;color:var(--cyan);margin-bottom:4px;">週-kg目標</div>
          <div style="font-size:18px;font-weight:700;color:var(--cyan);font-family:'DM Mono',monospace;">${weeklyLoss??'--'}kg</div>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px;">
          <span>${cw}kg</span><span>${tw}kg</span>
        </div>
        <div style="background:var(--bg3);border-radius:20px;height:8px;">
          <div style="width:0%;height:8px;border-radius:20px;background:var(--cyan);"></div>
        </div>
        <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:6px;">スタート地点</div>
      </div>`;
  } else {
    statsEl.innerHTML=`<div style="text-align:center;font-size:13px;color:var(--text2);padding:8px;">期限を設定してください</div>`;
  }

  if(timelineEl){
    if(dl&&weeksLeft&&weeksLeft>0&&diff>0){
      const steps=Math.min(weeksLeft,12);
      const interval=Math.floor(weeksLeft/steps)||1;
      const rows=[];
      for(let i=0;i<=steps;i++){
        const w=i*interval;
        const wDate=new Date(); wDate.setDate(wDate.getDate()+w*7);
        const wLabel=`${wDate.getMonth()+1}/${wDate.getDate()}`;
        const wW=Math.max(tw,Math.round((cw-(diff/weeksLeft)*w)*10)/10);
        const pct=Math.round(((cw-wW)/diff)*100);
        const isLast=i===steps;
        rows.push(`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);">
          <div style="font-size:11px;color:var(--text3);width:36px;font-family:'DM Mono',monospace;flex-shrink:0;">${wLabel}</div>

    } else { timelineEl.innerHTML=''; }
  }
  if(noteEl&&weeklyLoss!==null){
    noteEl.textContent=`週-${weeklyLoss}kgは${weeklyLoss<=0.5?'✓ 筋肉を守りながら落とせる理想ペース':weeklyLoss<=1.0?'⚠ やや速め。タンパク質をしっかり摂って筋肉を守る':'⚠ ペースが速すぎます。期限を延ばすか目標を見直してください'}`;
  }
}

function renderStats(){
  const el=document.getElementById('stats-content');
  const weightLog=lsGet('gl-weight-log')||[];
  const allEx={};
  trainingHistory.forEach(s=>(s.exercises||[]).forEach(e=>{
    if(!allEx[e.name]) allEx[e.name]=[];
    allEx[e.name].push({date:s.date,maxW:Math.max(...(e.sets||[]).map(st=>st.weight||0))});
  }));
  const exNames=Object.keys(allEx);
  const featEx=exNames[0]||null;
  const allW=trainingHistory.flatMap(s=>(s.exercises||[]).flatMap(e=>(e.sets||[]).map(st=>st.weight||0)));
  const maxW=allW.length?Math.max(...allW):0;
  const avgCal=mealHistory.length?Math.round(mealHistory.reduce((s,m)=>s+(m.calories||0),0)/Math.max(1,new Set(mealHistory.map(m=>m.date)).size)):0;
  // 部位フィルター対応のex選択
  // muscleParts（部位変換済み）があればそれを使い、なければmuscleGroupから
  const allMuscleGroupsRaw=trainingHistory.flatMap(s=>s.muscleParts||[s.muscleGroup||'']).filter(Boolean);
  const allMuscleGroups=[...new Set(allMuscleGroupsRaw)].filter(g=>Object.keys(MUSCLE_COLORS).includes(g));
  const muscleFilterSel=allMuscleGroups.length>0?`<select id="muscle-filter" onchange="updateWeightChartByFilter()" style="font-size:12px;padding:4px 8px;border-radius:6px;background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);margin-left:6px;"><option value="">全部位</option>${allMuscleGroups.map(g=>`<option value="${g}">${g}</option>`).join('')}</select>`:'';
  const exSelect=exNames.length>1?`<select id="ex-select" onchange="updateWeightChart()" style="font-size:12px;padding:4px 8px;border-radius:6px;background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);margin-left:6px;">${exNames.map(n=>`<option value="${n}">${n}</option>`).join('')}</select>`:'';
  // 最近のセッションを日付単位にまとめる
  const recentSessionsAll=[...trainingHistory].sort((a,b)=>b.savedAt-a.savedAt);
  const dateMap=new Map();
  recentSessionsAll.forEach(s=>{
    if(!dateMap.has(s.date)) dateMap.set(s.date,[]);
    dateMap.get(s.date).push(s);
  });
  const recentDates=[...dateMap.keys()].slice(0,8);
  const histHTML=recentDates.map((date,di)=>{
    const daySessions=dateMap.get(date);
    const mergedEx=flattenMergeSessionDay(daySessions);
    const totalSets=mergedEx.reduce((sum,e)=>sum+e.sets.length,0);
    const rows=buildSessionRows(mergedEx);
    const editRows=buildEditRows(mergedEx,'hs'+di);
    const realIdxArr=[...new Set(mergedEx.map(e=>e.realIdx))];
    return `<div style="border-bottom:0.5px solid var(--border);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;cursor:pointer;" onclick="toggleHistDay('hist-body-${di}','hist-chev-${di}')">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text);">${date}</span>
          <span style="font-size:11px;color:var(--text3);">${mergedEx.length}種目 ${totalSets}set</span>
        </div>
        <span id="hist-chev-${di}" style="font-size:13px;color:var(--text3);transition:transform .2s;">▾</span>
      </div>
      <div id="hist-body-${di}" style="display:none;padding-bottom:12px;">
        <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:8px;">${rows}</div>
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button onclick="toggleEditPanel('hist-edit-${di}')" style="font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2);cursor:pointer;">✏️ 修正</button>
          <button onclick="deleteAllTrainingSessions([${realIdxArr.join(',')}],'stats')" style="font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(232,85,85,0.12);color:var(--red);border:0.5px solid rgba(232,85,85,0.3);cursor:pointer;">🗑 削除</button>
        </div>
        <div id="hist-edit-${di}" style="display:none;margin-top:8px;background:var(--bg3);border-radius:var(--radius);padding:12px;">
          <div style="font-size:11px;color:var(--cyan);margin-bottom:10px;">種目・重量・repを修正</div>
          ${editRows}
          <button onclick="applyEditPanel('hs${di}',${JSON.stringify(realIdxArr)},'hist-edit-${di}','stats')" style="width:100%;padding:9px;background:var(--cyan);color:#000;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;">✓ 修正を適用</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const totalW=weightLog.length;
  const weightList=weightLog.slice(-5).reverse().map((w,i)=>{
    const realIdx=totalW-1-i;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);">
      <div>
        <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;">${w.w}kg</span>
        <span style="font-size:11px;color:var(--text3);margin-left:8px;">${w.date.slice(5)} ${w.t||''}</span>
      </div>
      <button onclick="deleteWeight(${realIdx})" style="font-size:11px;padding:3px 8px;border-radius:20px;background:rgba(232,85,85,0.12);color:var(--red);border:0.5px solid rgba(232,85,85,0.3);cursor:pointer;">削除</button>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="metric-grid">
      <div class="metric"><div class="metric-val">${trainingHistory.length}</div><div class="metric-label">総セッション</div></div>
      <div class="metric"><div class="metric-val">${maxW>0?maxW+'kg':'--'}</div><div class="metric-label">最高重量</div></div>
      <div class="metric"><div class="metric-val">${avgCal>0?avgCal:'--'}</div><div class="metric-label">平均kcal/日</div></div>
    </div>

    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <button onclick="calPrev()" style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 8px;">‹</button>
        <span id="cal-label" style="font-size:14px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace;"></span>
        <button onclick="calNext()" style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 8px;">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">
        ${['日','月','火','水','木','金','土'].map((d,i)=>`<div style="text-align:center;font-size:11px;color:${i===0?'var(--red)':i===6?'#3b82f6':'var(--text3)'};">${d}</div>`).join('')}
      </div>
      <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;"></div>
      <div id="cal-legend" style="display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:0.5px solid var(--border);">
        <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);"><span style="width:6px;height:6px;border-radius:50%;background:var(--cyan);display:inline-block;"></span>トレーニング</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);"><span style="width:5px;height:5px;border-radius:50%;background:var(--blue);opacity:0.5;display:inline-block;"></span>食事</span>
      </div>
    </div>
    <div id="cal-detail" style="margin-bottom:8px;"></div>

    <div class="card">
      <div class="card-title">⚖️ 体重を記録</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <input type="number" id="weight-input" placeholder="78.0" step="0.1" min="30" max="200"
          style="flex:1;padding:10px;font-size:18px;font-weight:700;font-family:'DM Mono',monospace;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);text-align:center;">
        <span style="font-size:14px;color:var(--text2);">kg</span>
        <button onclick="logWeight()" style="padding:10px 18px;background:var(--cyan);color:#000;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;">記録</button>
      </div>
      ${weightLog.length>0?weightList:'<div style="font-size:12px;color:var(--text3);">まだ記録がありません</div>'}
    </div>

    ${weightLog.length>=2?`<div class="card"><div class="card-title">📉 体重の推移</div><div class="chart-wrap"><canvas id="chartBW" role="img" aria-label="体重推移グラフ">体重データ</canvas></div></div>`:''}
    ${featEx?`<div class="card"><div class="card-title" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">📈 種目別最大重量${muscleFilterSel}${exSelect}</div><div class="chart-wrap"><canvas id="chartW" role="img" aria-label="重量推移グラフ">重量データ</canvas></div></div>`:''}
    ${(()=>{const uniqDays=new Set(mealHistory.map(m=>m.date)).size; return uniqDays>=3?`<div class="card"><div class="card-title">🥗 直近7日のPFC推移</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
        <span style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--blue);display:inline-block;"></span>タンパク質</span>
        <span style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--amber);display:inline-block;"></span>脂質</span>
        <span style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block;"></span>炭水化物</span>
      </div>
      <div class="chart-wrap"><canvas id="chartPFC" role="img" aria-label="PFC推移グラフ">PFCデータ</canvas></div></div>`:''})()}
    ${recentDates.length?`<div class="card"><div class="card-title">🕐 最近のセッション</div>${histHTML}</div>`:''}
    <div class="card" style="margin-top:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div class="card-title" style="margin:0;">🤖 AIトレーニング分析</div>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px;">記録を元に停滞・偏り・先週との比較をAIが分析します</p>
      <div id="ai-analysis-result"></div>
      <button onclick="runAIAnalysis()" class="btn-main" style="margin-top:8px;" id="ai-analysis-btn">🧠 分析してもらう</button>
    </div>`;
  setTimeout(()=>{
    window._allEx=allEx;
    renderCalendar();
    if(weightLog.length>=2&&document.getElementById('chartBW')) buildBodyWeightChart(weightLog);
    if(featEx&&document.getElementById('chartW')) buildWeightChart(featEx);
    if(new Set(mealHistory.map(m=>m.date)).size>=3&&document.getElementById('chartPFC')) buildPFCChart();
  },80);
}

// ── カレンダー ──
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function renderCalendar(){
  const grid=document.getElementById('cal-grid');
  const label=document.getElementById('cal-label');
  if(!grid||!label) return;
  label.textContent=`${calYear}年 ${calMonth+1}月`;
  const first=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  const startDow=first.getDay(); // 0=日

  // トレーニング・食事の日付マップ作成
  const trainMap={};
  trainingHistory.forEach(s=>{
    if(!trainMap[s.date]) trainMap[s.date]=[];
    if(s.muscleGroup) trainMap[s.date].push(s.muscleGroup);
  });
  const mealMap=new Set(mealHistory.map(m=>m.date));

  let cells='';
  // 空白セル
  for(let i=0;i<startDow;i++) cells+=`<div></div>`;
  // 日付セル
  for(let d=1;d<=lastDay;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today();
    const dow=(startDow+d-1)%7;
    const groups=trainMap[dateStr]||[];
    const hasMeal=mealMap.has(dateStr);
    const hasTrain=groups.length>0;
    const dotColor=groups.length>0?(MUSCLE_COLORS[groups[0]]||'var(--cyan)'):'';

    cells+=`<div onclick="showCalDetail('${dateStr}')" style="
      position:relative;height:36px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;border-radius:5px;cursor:pointer;
      background:${isToday?'rgba(56,189,248,0.15)':'transparent'};
      border:${isToday?'1px solid rgba(56,189,248,0.4)':'1px solid transparent'};
      transition:background .1s;">
      <span style="font-size:11px;font-weight:${isToday?700:400};color:${dow===0?'var(--red)':dow===6?'#3b82f6':'var(--text)'};">${d}</span>
      <div style="display:flex;gap:2px;margin-top:1px;min-height:5px;">
        ${hasTrain?`<span style="width:5px;height:5px;border-radius:50%;background:var(--cyan);display:inline-block;"></span>`:''}
        ${hasMeal?`<span style="width:4px;height:4px;border-radius:50%;background:var(--blue);opacity:0.5;display:inline-block;"></span>`:''}
      </div>
    </div>`;
  }
  grid.innerHTML=cells;
}

function showCalDetail(dateStr){
  const el=document.getElementById('cal-detail');
  if(!el) return;
  const sessions=trainingHistory.filter(s=>s.date===dateStr);
  const meals=mealHistory.filter(m=>m.date===dateStr);
  if(!sessions.length&&!meals.length){ el.innerHTML=''; return; }

  let html=`<div class="card" style="border-left:3px solid var(--cyan);">
    <div style="font-size:12px;font-weight:500;color:var(--cyan);margin-bottom:8px;">${dateStr}</div>`;

  if(sessions.length){
    const mergedEx=flattenMergeSessionDay(sessions);
    html+=`<div style="margin-bottom:8px;">${buildSessionRows(mergedEx)}</div>`;
  }
  if(meals.length){
    const tCal=Math.round(meals.reduce((s,m)=>s+(m.calories||0),0));
    const tP=Math.round(meals.reduce((s,m)=>s+(m.protein||0),0));
    html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border);">
      <span style="font-size:12px;color:var(--text2);">🍽 ${tCal}kcal</span>
      <span style="font-size:12px;color:var(--blue);">P ${tP}g</span>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function calPrev(){
  calMonth--;
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function calNext(){
  calMonth++;
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function updateWeightChartByFilter(){
  const filter=document.getElementById('muscle-filter')?.value||'';
  const filteredHistory=filter?trainingHistory.filter(s=>s.muscleGroup===filter):trainingHistory;
  const allEx={};
  filteredHistory.forEach(s=>(s.exercises||[]).forEach(e=>{
    if(!allEx[e.name]) allEx[e.name]=[];
    allEx[e.name].push({date:s.date,maxW:Math.max(...(e.sets||[]).map(st=>st.weight||0))});
  }));
  const names=Object.keys(allEx);
  if(!names.length) return;
  const exSel=document.getElementById('ex-select');
  if(exSel) exSel.innerHTML=names.map(n=>'<option value="'+n+'">'+n+'</option>').join('');
  window._allEx=allEx;
  buildWeightChart(names[0]);
}
function deleteWeight(idx){
  const log=lsGet('gl-weight-log')||[];
  if(idx<0||idx>=log.length){ showToast('削除対象が見つかりません'); return; }
  const entry=log[idx];
  if(!confirm(`${entry.w}kg (${entry.date} ${entry.t||''}) を削除しますか？`)) return;
  log.splice(idx,1);
  lsSet('gl-weight-log',log);
  showToast('削除しました');
  renderStats();
}

function logWeight(){
  const val=parseFloat(document.getElementById('weight-input').value);
  if(!val||val<30||val>200){ showToast('体重を正しく入力してください'); return; }
  const log=lsGet('gl-weight-log')||[];
  const now=new Date();
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  log.push({date:today(),t:time,w:val});
  lsSet('gl-weight-log',log);
  showToast(`${val}kg を記録しました`);
  renderStats();
}

function buildBodyWeightChart(log){
  if(chartInstances.bw) chartInstances.bw.destroy();
  const sorted=[...log].sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
  const goalSetting=lsGet('gl-goal-setting')||{};
  const datasets=[{
    label:'体重(kg)',data:sorted.map(d=>d.w),
    borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.08)',
    fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#3b82f6',borderWidth:2
  }];
  if(goalSetting.targetW){
    datasets.push({label:'目標',data:sorted.map(()=>goalSetting.targetW),
      borderColor:'#38bdf8',borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false});
  }
  chartInstances.bw=new Chart(document.getElementById('chartBW'),{
    type:'line',data:{labels:sorted.map(d=>`${d.date.slice(5)}${d.t?' '+d.t:''}`),datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:false,ticks:{color:'#7a9ab8',font:{size:11}},grid:{color:'rgba(56,189,248,0.07)'}},
        x:{ticks:{color:'#7a9ab8',font:{size:11}},grid:{display:false}}}}
  });
}

function buildWeightChart(exName){
  if(chartInstances.w) chartInstances.w.destroy();
  const data=(window._allEx[exName]||[]).sort((a,b)=>a.date.localeCompare(b.date));
  chartInstances.w=new Chart(document.getElementById('chartW'),{
    type:'line',
    data:{labels:data.map(d=>d.date.slice(5)),datasets:[{label:'最大重量(kg)',data:data.map(d=>d.maxW),borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,0.08)',fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#38bdf8',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{color:'#7a9ab8',font:{size:11}},grid:{color:'rgba(56,189,248,0.07)'}},x:{ticks:{color:'#7a9ab8',font:{size:11}},grid:{display:false}}}}
  });
}
function updateWeightChart(){
  const sel=document.getElementById('ex-select');
  if(sel) buildWeightChart(sel.value);
}
function buildPFCChart(){
  if(chartInstances.pfc) chartInstances.pfc.destroy();
  const days=[]; for(let i=6;i>=0;i--){const d=new Date(new Date().getTime()+9*60*60*1000);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  chartInstances.pfc=new Chart(document.getElementById('chartPFC'),{
    type:'bar',
    data:{labels:days.map(d=>d.slice(5)),datasets:[
      {label:'タンパク質',data:days.map(d=>Math.round(mealHistory.filter(m=>m.date===d).reduce((s,m)=>s+(m.protein||0),0))),backgroundColor:'rgba(59,130,246,0.7)',stack:'p'},
      {label:'脂質',data:days.map(d=>Math.round(mealHistory.filter(m=>m.date===d).reduce((s,m)=>s+(m.fat||0),0))),backgroundColor:'rgba(245,158,11,0.7)',stack:'p'},
      {label:'炭水化物',data:days.map(d=>Math.round(mealHistory.filter(m=>m.date===d).reduce((s,m)=>s+(m.carbs||0),0))),backgroundColor:'rgba(16,185,129,0.7)',stack:'p'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{stacked:true,ticks:{color:'#7a9ab8',font:{size:11}},grid:{color:'rgba(56,189,248,0.07)'}},x:{stacked:true,ticks:{color:'#7a9ab8',font:{size:11},autoSkip:false},grid:{display:false}}}}
  });
}

// ── Helpers ──
function today(){
  const d=new Date();
  const jst=new Date(d.getTime()+9*60*60*1000);
  return jst.toISOString().slice(0,10);
}
function copyText(encoded){
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(()=>showToast('コピーしました！')).catch(()=>{
    const t=document.createElement('textarea');
    t.value=decodeURIComponent(encoded); document.body.appendChild(t);
    t.select(); document.execCommand('copy'); document.body.removeChild(t);
    showToast('コピーしました！');
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function showError(id,title,detail){
  document.getElementById(id).innerHTML=`<div class="error-card"><div class="error-msg">⚠ ${title}</div><div class="error-detail">${detail}</div></div>`;
}

loadAll();
</script>
</body>
</html>
